  { id:4, date:'2. november 2025',  day:'2',  month:'nov 2025',      time:'17:00', title:'Allehelgensaften',         venue:'Sankt Petri Kirke',             type:'Allehelgensconcert', soldOut:true, price:'kr. 180' },

  { src:'assets/photo-conductor.jpg',      caption:'Dirigent Laus Richter Larsen' },

  { src:'assets/photo-candles.jpg',        caption:'Julekoncert, 2024' },

const RECORDINGS = [

  { id:'v3', title:'Fra Mørket til Lyset — Julekoncert',       year:'2024', duration:'54:10', thumb:'assets/photo-candles.jpg' },

const SPONSORS = [

  { name:'William Demant Fonden', tier:'Projektpartner' },

/* ─── HERO PHOTOS ─────────────────────────────────────── */
const HERO_PHOTOS = {

/* ─── THEME SYSTEM ────────────────────────────────────── */
const getTheme = (name) => ({
  mørk: {
    bg: '#0d0d0b', bgAlt: '#2a2825', fg: '#f7f5f0', fgMuted: '#8a8278',
    fgSub: 'rgba(247,245,240,0.55)', border: '#2a2825', borderLight: '#3a3835',
    accent: '#c8933a', headerBg: 'rgba(13,13,11,0.92)', headerBorder: '#2a2825',
    cardBg: '#1a1917', sectionBg: '#0d0d0b', altSectionBg: '#1a1917',
    dark: true,
  },
  lys: {
    bg: '#f7f5f0', bgAlt: '#f0ece4', fg: '#0d0d0b', fgMuted: '#8a8278',
    fgSub: 'rgba(13,13,11,0.45)', border: '#c4bdb4', borderLight: '#ddd8d0',
    accent: '#c8933a', headerBg: 'rgba(247,245,240,0.95)', headerBorder: '#c4bdb4',
    cardBg: '#f0ece4', sectionBg: '#f7f5f0', altSectionBg: '#f0ece4',
    dark: false,
  },
  dramatisk: {

/* ─── SHARED LABEL ─────────────────────────────────────── */
const Label = ({ children, t }) => (
  <div style={{ fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'10px', fontWeight:500,
    letterSpacing:'0.14em', textTransform:'uppercase', color: t.fgMuted }}>
    {children}
  </div>
);

/* ─── HEADER ───────────────────────────────────────────── */
const Header = ({ t, theme, scrolled }) => {
  const navLinks = [
    { href:'#koncerter', label:'Koncerter' },
    { href:'#galleri', label:'Galleri' },
    { href:'#optagelser', label:'Optagelser' },
    { href:'#video', label:'Video' },
    { href:'#om-koret', label:'Om koret' },
    { href:'#støt-os', label:'Støt os' },
    { href:'#kontakt', label:'Kontakt' },
  ];

  const bgVisible = scrolled || theme === 'lys';

  return (
    <header style={{
      position:'fixed', top:0, left:0, right:0, zIndex:200,
      display:'flex', alignItems:'center', justifyContent:'space-between',
      padding:'14px clamp(20px,4vw,48px)',
      background: bgVisible ? t.headerBg : 'transparent',
      backdropFilter: bgVisible ? 'blur(12px)' : 'none',
      borderBottom: bgVisible ? `1px solid ${t.headerBorder}` : '1px solid transparent',
      transition: 'background 350ms ease-out, border-color 350ms ease-out',
    }}>
      <a href="#top">
        <img src="assets/KRS-logo.jpg" alt="Kammerkoret Richters Skala"
          style={{ height:'40px', width:'auto',
            filter: t.dark ? 'invert(1) brightness(1.8)' : 'none' }} />
      </a>
      <nav>
        <ul style={{ display:'flex', gap:'clamp(16px,2.5vw,32px)', listStyle:'none' }}>
          {navLinks.map(l => (
            <li key={l.href}>
              <a href={l.href} style={{
                fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'10px', fontWeight:500,
                letterSpacing:'0.12em', textTransform:'uppercase',
                color: t.fg, opacity:0.7,
              }}>{l.label}</a>
            </li>
          ))}
        </ul>
      </nav>
    </header>
  );
};

/* ─── HERO ─────────────────────────────────────────────── */
const Hero = ({ t, heroPhoto }) => (
  <section id="top" data-screen-label="Hero" style={{ position:'relative', width:'100%', height:'100vh', overflow:'hidden', display:'flex', alignItems:'flex-end' }}>
    <img src={HERO_PHOTOS[heroPhoto] || HERO_PHOTOS.museum} alt=""
      style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'center 25%', filter:'brightness(0.48)' }} />
    <div style={{ position:'absolute', inset:0, background:'linear-gradient(to top, rgba(13,13,11,0.9) 0%, rgba(13,13,11,0.2) 50%, transparent 100%)' }}></div>
    <div style={{ position:'relative', zIndex:2, padding:'0 clamp(20px,4vw,64px) clamp(48px,7vh,96px)', maxWidth:'900px' }}>
      <Label t={{ fgMuted: '#c8933a' }}>Næste koncert</Label>
      <h1 style={{ fontFamily:"'Cormorant Garamond',Georgia,serif", fontSize:'clamp(3rem,6vw,5.8rem)', fontWeight:300, lineHeight:1.02, letterSpacing:'-0.01em', color:'#f7f5f0', margin:'16px 0 18px' }}>
        Stemmer i hvælvet
      </h1>
      <p style={{ fontFamily:"'EB Garamond',Georgia,serif", fontSize:'clamp(17px,1.6vw,21px)', fontStyle:'italic', lineHeight:1.65, color:'rgba(247,245,240,0.68)', marginBottom:'40px', maxWidth:'520px' }}>
        Forårskoncert — 17. maj 2025, kl. 19:30<br />Vor Frue Kirke, København
      </p>
      <div style={{ display:'flex', gap:'12px', flexWrap:'wrap' }}>
        <a href="#koncerter" style={{
          fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'10px', fontWeight:500,
          letterSpacing:'0.13em', textTransform:'uppercase',
          background:'#f7f5f0', color:'#0d0d0b', padding:'14px 32px', display:'inline-block',
        }}>Køb billetter</a>
        <a href="#koncerter" style={{
          fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'10px', fontWeight:500,
          letterSpacing:'0.13em', textTransform:'uppercase',
          background:'transparent', color:'#f7f5f0', border:'1px solid rgba(247,245,240,0.35)', padding:'14px 32px', display:'inline-block',
        }}>Se alle koncerter</a>
      </div>
    </div>
    {/* scroll cue */}
    <div style={{ position:'absolute', bottom:'28px', right:'clamp(20px,4vw,48px)', zIndex:2 }}>
      <div style={{ fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'9px', letterSpacing:'0.14em', textTransform:'uppercase', color:'rgba(247,245,240,0.4)', writingMode:'vertical-rl', transform:'rotate(180deg)' }}>
        Rul ned
      </div>
    </div>
  </section>
);

/* ─── KONCERTKALENDER ──────────────────────────────────── */
const Koncertkalender = ({ t }) => {
  const [expanded, setExpanded] = React.useState(null);

  return (
    <section id="koncerter" data-screen-label="Koncertkalender" style={{ background: t.sectionBg, padding:'80px clamp(20px,4vw,48px) 80px' }}>
      <div style={{ maxWidth:'1080px', margin:'0 auto' }}>
        <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginBottom:'40px', paddingBottom:'20px', borderBottom:`1px solid ${t.border}` }}>
          <div>
            <Label t={t}>Sæson 2025</Label>
            <h2 style={{ fontFamily:"'Cormorant Garamond',Georgia,serif", fontSize:'clamp(2rem,3.5vw,3rem)', fontWeight:300, lineHeight:1.05, color: t.fg, marginTop:'10px', letterSpacing:'-0.01em' }}>
              Kommende koncerter
            </h2>
          </div>
          <div style={{ fontFamily:"'EB Garamond',Georgia,serif", fontSize:'15px', fontStyle:'italic', color: t.fgMuted }}>
            {EVENTS.length} koncerter
          </div>
        </div>

        {EVENTS.map((e, i) => (
          <div key={e.id}>
            <div
              onClick={() => setExpanded(expanded === e.id ? null : e.id)}
              style={{
                display:'grid',
                gridTemplateColumns:'72px 1fr auto',
                gap:'0 28px',
                alignItems:'center',
                padding:'22px 0',
                cursor:'pointer',
                borderTop: i === 0 ? 'none' : `1px solid ${t.border}`,
                transition:'opacity 200ms',
              }}
              onMouseEnter={ev => ev.currentTarget.style.opacity='0.65'}
              onMouseLeave={ev => ev.currentTarget.style.opacity='1'}
            >
              <div style={{ textAlign:'center', borderRight:`1px solid ${t.border}`, paddingRight:'20px' }}>
                <div style={{ fontFamily:"'Cormorant Garamond',Georgia,serif", fontSize:'42px', fontWeight:300, lineHeight:1, color: t.accent }}>{e.day}</div>
                <div style={{ fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'9px', fontWeight:500, letterSpacing:'0.1em', textTransform:'uppercase', color: t.fgMuted, marginTop:'3px' }}>{e.month}</div>
              </div>
              <div style={{ paddingLeft:'4px' }}>
                <div style={{ fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'9px', fontWeight:500, letterSpacing:'0.1em', textTransform:'uppercase', color: t.fgMuted, marginBottom:'6px' }}>{e.type}</div>
                <div style={{ fontFamily:"'Cormorant Garamond',Georgia,serif", fontSize:'clamp(18px,2vw,24px)', fontWeight:400, color: t.fg, lineHeight:1.2 }}>{e.title}</div>
                <div style={{ fontFamily:"'EB Garamond',Georgia,serif", fontSize:'15px', fontStyle:'italic', color: t.fgMuted, marginTop:'4px' }}>{e.venue}</div>
              </div>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'13px', color: t.fgMuted }}>{e.time}</div>
                <div style={{ fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'9px', fontWeight:500, letterSpacing:'0.1em', textTransform:'uppercase', color: e.soldOut ? t.fgMuted : t.accent, marginTop:'6px' }}>
                  {e.soldOut ? 'Udsolgt' : 'Billetter'}
                </div>
              </div>
            </div>

            {expanded === e.id && (
              <div style={{ background: t.cardBg, border:`1px solid ${t.border}`, padding:'28px 32px', marginBottom:'2px', display:'grid', gridTemplateColumns:'1fr auto', gap:'32px', alignItems:'start' }}>
                <div>
                  <div style={{ fontFamily:"'EB Garamond',Georgia,serif", fontSize:'17px', lineHeight:1.75, color: t.dark ? 'rgba(247,245,240,0.75)' : '#2a2825', marginBottom:'16px' }}>
                    En aften med kammerkorets fortolkning af tidløs kormusik i en af Københavns smukkeste kirker. Programmet rummer værker fra renæssancen til det 21. århundrede.
                  </div>
                  <div style={{ display:'flex', gap:'36px', marginTop:'8px' }}>
                    {[['Dato', e.date], ['Kl.', e.time], ['Sted', e.venue]].map(([k,v]) => (
                      <div key={k}>
                        <div style={{ fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'9px', fontWeight:500, letterSpacing:'0.1em', textTransform:'uppercase', color: t.fgMuted, marginBottom:'4px' }}>{k}</div>
                        <div style={{ fontFamily:"'EB Garamond',Georgia,serif", fontSize:'15px', fontStyle:'italic', color: t.fg }}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{ minWidth:'160px' }}>
                  <div style={{ fontFamily:"'Cormorant Garamond',Georgia,serif", fontSize:'28px', fontWeight:300, color: t.fg, marginBottom:'4px' }}>{e.price}</div>
                  <div style={{ fontFamily:"'EB Garamond',Georgia,serif", fontSize:'13px', fontStyle:'italic', color: t.fgMuted, marginBottom:'16px' }}>Studerende halvpris</div>
                  {!e.soldOut ? (
                    <button style={{
                      width:'100%', fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'9px', fontWeight:500,
                      letterSpacing:'0.12em', textTransform:'uppercase',
                      background: t.dark ? '#f7f5f0' : '#0d0d0b', color: t.dark ? '#0d0d0b' : '#f7f5f0',
                      border:'none', padding:'12px', marginBottom:'8px',
                    }}>Køb billetter</button>
                  ) : (
                    <div style={{ fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'9px', letterSpacing:'0.1em', textTransform:'uppercase', color: t.fgMuted, padding:'12px', textAlign:'center', border:`1px solid ${t.border}`, marginBottom:'8px' }}>Udsolgt</div>
                  )}
                  <button style={{
                    width:'100%', fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'9px', fontWeight:500,
                    letterSpacing:'0.12em', textTransform:'uppercase',
                    background:'transparent', color: t.fgMuted, border:`1px solid ${t.border}`, padding:'11px',
                  }}>Tilføj til kalender</button>
                </div>
              </div>
            )}
          </div>
        ))}
        <div style={{ borderTop:`1px solid ${t.border}` }}></div>
      </div>
    </section>
  );
};

/* ─── BILLEDGALLERI ────────────────────────────────────── */
const Galleri = ({ t, columns }) => {
  const [lightbox, setLightbox] = React.useState(null);
  const cols = Math.min(Math.max(columns || 3, 2), 4);

  return (
    <section id="galleri" data-screen-label="Billedgalleri" style={{ background: t.altSectionBg, padding:'80px 0 0' }}>
      <div style={{ maxWidth:'1080px', margin:'0 auto', padding:'0 clamp(20px,4vw,48px)', marginBottom:'40px' }}>
        <Label t={t}>Fotografi</Label>
        <h2 style={{ fontFamily:"'Cormorant Garamond',Georgia,serif", fontSize:'clamp(2rem,3.5vw,3rem)', fontWeight:300, color: t.dark ? '#f7f5f0' : '#0d0d0b', marginTop:'10px', letterSpacing:'-0.01em' }}>
          Billedgalleri
        </h2>
      </div>

      <div style={{
        display:'grid',
        gridTemplateColumns:`repeat(${cols}, 1fr)`,
        gap:'2px',
      }}>
        {PHOTOS.map((p, i) => (
          <div key={i}
            onClick={() => setLightbox(i)}
            style={{ position:'relative', overflow:'hidden', cursor:'pointer',
              aspectRatio: i === 0 || i === 4 ? '16/9' : '4/3',
              gridColumn: (cols === 3 && (i === 0 || i === 4)) ? 'span 2' : 'span 1',
            }}
          >
            <img src={p.src} alt={p.caption}
              style={{ width:'100%', height:'100%', objectFit:'cover', filter:'brightness(0.78)',
                transition:'transform 500ms ease-out, filter 500ms ease-out' }}
              onMouseEnter={ev => { ev.target.style.transform='scale(1.04)'; ev.target.style.filter='brightness(0.9)'; }}
              onMouseLeave={ev => { ev.target.style.transform='scale(1)'; ev.target.style.filter='brightness(0.78)'; }}
            />
            <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'16px 20px',
              background:'linear-gradient(to top, rgba(13,13,11,0.7), transparent)',
              fontFamily:"'EB Garamond',Georgia,serif", fontSize:'13px', fontStyle:'italic', color:'rgba(247,245,240,0.75)',
            }}>{p.caption}</div>
          </div>
        ))}
      </div>

      {lightbox !== null && (
        <div onClick={() => setLightbox(null)} style={{
          position:'fixed', inset:0, zIndex:500, background:'rgba(13,13,11,0.95)',
          display:'flex', alignItems:'center', justifyContent:'center', cursor:'zoom-out',
        }}>
          <img src={PHOTOS[lightbox].src} alt="" style={{ maxWidth:'90vw', maxHeight:'88vh', objectFit:'contain' }} />
          <div style={{ position:'absolute', bottom:'32px', left:'50%', transform:'translateX(-50%)',
            fontFamily:"'EB Garamond',Georgia,serif", fontSize:'15px', fontStyle:'italic', color:'rgba(247,245,240,0.6)' }}>
            {PHOTOS[lightbox].caption}
          </div>
          <button onClick={() => setLightbox(lightbox > 0 ? lightbox - 1 : PHOTOS.length - 1)}
            style={{ position:'absolute', left:'32px', top:'50%', transform:'translateY(-50%)',
              background:'none', border:'none', color:'rgba(247,245,240,0.5)', fontSize:'32px', fontFamily:'serif' }}>‹</button>
          <button onClick={ev => { ev.stopPropagation(); setLightbox(lightbox < PHOTOS.length - 1 ? lightbox + 1 : 0); }}
            style={{ position:'absolute', right:'32px', top:'50%', transform:'translateY(-50%)',
              background:'none', border:'none', color:'rgba(247,245,240,0.5)', fontSize:'32px', fontFamily:'serif' }}>›</button>
        </div>
      )}
    </section>
  );
};

/* ─── OPTAGELSER ───────────────────────────────────────── */
const Optagelser = ({ t }) => {
  const [playing, setPlaying] = React.useState(null);
  const [progress, setProgress] = React.useState({});

  const toggle = (id) => {
    setPlaying(playing === id ? null : id);
  };

  const WaveformSVG = ({ active }) => (
    <svg width="48" height="20" viewBox="0 0 48 20" fill="none">
      {[4,8,14,6,18,10,16,8,12,6,14,10].map((h,i) => (
        <rect key={i} x={i*4} y={(20-h)/2} width="2.5" rx="1.25" height={h}
          fill={active ? '#c8933a' : t.fgMuted}
          style={{ transition:'fill 200ms' }}
          opacity={active ? (0.5 + (i%3)*0.17) : 0.5}
        />
      ))}
    </svg>
  );

  return (
    <section id="optagelser" data-screen-label="Optagelser" style={{ background: t.sectionBg, padding:'80px clamp(20px,4vw,48px)' }}>
      <div style={{ maxWidth:'780px', margin:'0 auto' }}>
        <Label t={t}>Lyd</Label>
        <h2 style={{ fontFamily:"'Cormorant Garamond',Georgia,serif", fontSize:'clamp(2rem,3.5vw,3rem)', fontWeight:300, color: t.fg, marginTop:'10px', marginBottom:'40px', letterSpacing:'-0.01em' }}>
          Optagelser

      <Hero t={t} heroPhoto={tweaks.heroPhoto} />
      <Koncertkalender t={t} />
      <Galleri t={t} columns={tweaks.galleryColumns} />
      <Optagelser t={t} />
      <Video t={t} />
      <OmKoret t={t} />
      <StøtOs t={t} />
      <Kontakt t={t} />
      <Footer t={t} />

      <TweaksPanel>
        <TweakSection title="Tema">
          <TweakRadio id="theme" label="Visuel retning"
            options={[{label:'Mørk', value:'mørk'},{label:'Lys', value:'lys'},{label:'Dramatisk', value:'dramatisk'}]}
            value={tweaks.theme} onChange={v => setTweak('theme', v)} />
        </TweakSection>
        <TweakSection title="Hero">
          <TweakRadio id="heroPhoto" label="Hero-foto"
            options={[{label:'Museum', value:'museum'},{label:'Kirke', value:'church'},{label:'Lys', value:'candles'},{label:'Sangere', value:'singers'}]}
            value={tweaks.heroPhoto} onChange={v => setTweak('heroPhoto', v)} />
        </TweakSection>
        <TweakSection title="Galleri">
          <TweakSlider id="galleryColumns" label="Kolonner" min={2} max={4} step={1}
            value={tweaks.galleryColumns} onChange={v => setTweak('galleryColumns', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
