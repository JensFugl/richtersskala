/* ─── DATE / CALENDAR UTILS ────────────────────────────── */
const DANISH_MONTHS = {
  'januar':1,'februar':2,'marts':3,'april':4,'maj':5,'juni':6,
  'juli':7,'august':8,'september':9,'oktober':10,'november':11,'december':12,
};

function parseDanishDate(dateStr) {
  const [dayPart, monthPart, yearPart] = dateStr.trim().split(/\s+/);
  return { day: parseInt(dayPart,10), month: DANISH_MONTHS[monthPart.toLowerCase()], year: parseInt(yearPart,10) };
}

function toICSDate(year, month, day) {
  return `${year}${String(month).padStart(2,'0')}${String(day).padStart(2,'0')}`;
}

function eventDates(ev) {
  const start = parseDanishDate(ev.date);
  const dayField = String(ev.day);
  const dashIdx = dayField.search(/[–—-]/);
  const lastDay = dashIdx !== -1 ? parseInt(dayField.slice(dashIdx+1),10) : start.day;
  let endYear = start.year, endMonth = start.month, endDay = lastDay + 1;
  const daysInMonth = new Date(endYear, endMonth, 0).getDate();
  if (endDay > daysInMonth) { endDay -= daysInMonth; endMonth += 1; }
  if (endMonth > 12) { endMonth = 1; endYear += 1; }
  return { dtStart: toICSDate(start.year, start.month, start.day), dtEnd: toICSDate(endYear, endMonth, endDay) };
}

function openGoogleCalendar(ev) {
  const { dtStart, dtEnd } = eventDates(ev);
  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: `${ev.title} – Kammerkoret Richters Skala`,
    dates: `${dtStart}/${dtEnd}`,
    ...(ev.venue && { location: ev.venue }),
  });
  window.open(`https://calendar.google.com/calendar/render?${params}`, '_blank');
}

    const mq = window.matchMedia('(max-width: 767px)');
    const handler = e => setMobile(e.matches);
    mq.addEventListener('change', handler);
    return () => mq.removeEventListener('change', handler);
  }, []);
  return mobile;
};

/* ─── OPTAGELSER ───────────────────────────────────────── */
const Optagelser = () => {
  const t = React.useContext(ThemeCtx);
  const [recordings, setRecordings] = React.useState([]);
  const [status, setStatus] = React.useState('loading');
  const [playingIdx, setPlayingIdx] = React.useState(null);
  const [progress, setProgress] = React.useState(0);
  const [duration, setDuration] = React.useState(0);
  const audioRef = React.useRef(null);

  React.useEffect(() => {
    fetch('recordings.json')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        const entries = Array.isArray(data) ? data : [];
        setRecordings(entries);
        setStatus(entries.length ? 'ready' : 'empty');
      })
      .catch(() => setStatus('error'));
  }, []);

  React.useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    const onTime = () => setProgress(audio.duration ? audio.currentTime / audio.duration : 0);
    const onMeta = () => setDuration(audio.duration);
    const onEnd  = () => { setPlayingIdx(null); setProgress(0); };
    audio.addEventListener('timeupdate', onTime);
    audio.addEventListener('loadedmetadata', onMeta);
    audio.addEventListener('ended', onEnd);
    return () => {
      audio.removeEventListener('timeupdate', onTime);
      audio.removeEventListener('loadedmetadata', onMeta);
      audio.removeEventListener('ended', onEnd);
    };
  }, []);

  const toggle = (i) => {
    const audio = audioRef.current;
    if (playingIdx === i) {
      audio.pause();
      setPlayingIdx(null);
    } else {
      audio.src = recordings[i].url;
      audio.play();
      setPlayingIdx(i);
      setProgress(0);
    }
  };

  const fmtTime = (s) => {
    if (!s || !isFinite(s)) return '';
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  };

  const Waveform = ({ active }) => (
    <svg width="48" height="20" viewBox="0 0 48 20" fill="none">
      {[4,8,14,6,18,10,16,8,12,6,14,10].map((h,i) => (
        <rect key={i} x={i*4} y={(20-h)/2} width="2.5" rx="1.25" height={h}
          fill={active ? t.accent : t.fgMuted}
          style={{ transition:'fill 200ms' }}
          opacity={active ? (0.5 + (i%3)*0.17) : 0.5}
        />
      ))}
    </svg>
  );

  return (
    <section id="optagelser" className="section" style={{ background:'var(--section-bg)' }}>
      <audio ref={audioRef} />
      <div style={{ maxWidth:'780px', margin:'0 auto' }}>
        <div className="eyebrow">Lyd</div>
        <h2 className="display h2" style={{ marginTop:'10px', marginBottom:'40px' }}>Optagelser</h2>

        {status === 'loading' && <StatusMessage>Henter optagelser…</StatusMessage>}
        {status === 'error'   && <StatusMessage>Optagelser er midlertidigt utilgængelige.</StatusMessage>}
        {status === 'empty'   && <StatusMessage>Ingen optagelser fundet.</StatusMessage>}

        {status === 'ready' && recordings.map((rec, i) => {
          const isPlaying = playingIdx === i;
          return (
            <div key={i} style={{ display:'grid', gridTemplateColumns:'40px 1fr auto', gap:'0 20px', alignItems:'center', padding:'18px 0', borderTop:'1px solid var(--border)' }}>
              <button onClick={() => toggle(i)} aria-label={isPlaying ? 'Pause' : 'Afspil'} style={{
                width:'40px', height:'40px',
                border:`1px solid ${isPlaying ? 'var(--accent)' : 'var(--border)'}`,
                background: isPlaying ? 'var(--accent)' : 'transparent',
                display:'flex', alignItems:'center', justifyContent:'center',
                transition:'all 200ms',
              }}>
                {isPlaying ? (
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="#0d0d0b">
                    <rect x="1" y="1" width="4" height="10" rx="0.5"/><rect x="7" y="1" width="4" height="10" rx="0.5"/>
                  </svg>
                ) : (
                  <svg width="12" height="12" viewBox="0 0 12 12" fill={t.fg}>
                    <path d="M2 1.5 L11 6 L2 10.5 Z"/>
                  </svg>
                )}
              </button>
              <div>
                <div className="display" style={{ fontSize:'20px', fontWeight:400, lineHeight:1.2 }}>{rec.title}</div>
                {isPlaying && (
                  <div style={{ marginTop:'10px', height:'3px', background:'var(--border)', position:'relative' }}>
                    <div style={{ position:'absolute', left:0, top:0, height:'100%', width:`${progress * 100}%`, background:'var(--accent)', transition:'width 200ms' }}></div>
                  </div>
                )}
              </div>
              <div style={{ textAlign:'right' }}>
                {isPlaying
                  ? <Waveform active />
                  : <div style={{ fontFamily:"'Outfit',system-ui,sans-serif", fontSize:'12px', color:'var(--fg-muted)' }}>{fmtTime(duration)}</div>}
              </div>
            </div>
          );
        })}
        {status === 'ready' && <div style={{ borderTop:'1px solid var(--border)' }}></div>}
      </div>
    </section>
  );
};

/* ─── APP ──────────────────────────────────────────────── */
const App = () => {
  const [isDark, setIsDark] = React.useState(() => localStorage.getItem('krs-theme') !== 'light');
  const [scrolled, setScrolled] = React.useState(false);
  const isMobile = useIsMobile();
  const theme = isDark ? themes.dark : themes.light;

  const toggleTheme = () => setIsDark(d => {
    localStorage.setItem('krs-theme', d ? 'light' : 'dark');
    return !d;
  });

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 80);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <ThemeCtx.Provider value={theme}>
    <LayoutCtx.Provider value={isMobile}>
      <div className="app" style={themeVars(theme)}>
        <Header scrolled={scrolled} toggleTheme={toggleTheme} isDark={isDark} />
        <Hero />
        <Koncertkalender />
        <Galleri />
        <Optagelser />
        <Video />
        <OmKoret />
        <StøtOs />
        <Kontakt />
        <Footer />
      </div>
    </LayoutCtx.Provider>
    </ThemeCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
